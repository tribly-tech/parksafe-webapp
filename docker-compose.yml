services:
  postgres:
    image: postgres:16-alpine
    container_name: parksafe-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parksafe
    volumes:
      - parksafe_pg_data:/var/lib/postgresql/data

volumes:
  parksafe_pg_data:
