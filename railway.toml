# API backend service — point Railway "Config file path" here, or use these commands in the API service settings.
[build]
buildCommand = "pnpm install && pnpm turbo build --filter=@parksafe/types --filter=@parksafe/db --filter=@parksafe/api --force"

[deploy]
startCommand = "pnpm --filter @parksafe/api start"
healthcheckPath = "/health"
